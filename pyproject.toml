[tool.uv.workspace]
members = ["apps/*", "packages/*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
testpaths = ["apps", "packages"]
markers = ["unit", "integration"]

[dependency-groups]
dev = [
    "jupyterlab>=4.5.6",
    "matplotlib>=3.10.8",
    "seaborn>=0.13.2",
]

[tool.uv.workspace]
members = ["apps/*", "packages/*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
testpaths = ["apps", "packages", "tests"]
markers = ["unit", "integration"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.9",
    "mypy>=1.15",
]

[tool.uv.workspace]
members = ["apps/*", "packages/*"]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["test.py"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = false
exclude = ["^.*/tests/.*\\.py$", "^tests/.*\\.py$"]

# Third-party libraries that ship without type stubs
[[tool.mypy.overrides]]
module = [
    "asyncpg.*",
    "pyarrow.*",
    "pyiceberg.*",
    "chromadb.*",
    "prefect.*",
    "confluent_kafka.*",
    "minio.*",
    "duckdb.*",
    "mlflow.*",
    "psycopg2.*",
    "s3fs.*",
    "joblib.*",
    "sklearn.*",
    "requests.*",
    "httpx.*",
    "logger",
]
ignore_missing_imports = true

# Streaming uses bare imports (from logger import Logger) that only resolve
# inside the Docker container — skip type-checking these files.
[[tool.mypy.overrides]]
module = [
    "streaming.main",
    "streaming.consumers.kafka",
    "streaming.processors.traffic",
    "streaming.processors.weather",
    "streaming.sinks.minio",
]
ignore_errors = true

# Batch pipeline: Prefect serve() + PyIceberg filter API stubs are inaccurate
[[tool.mypy.overrides]]
module = [
    "batch.main",
    "batch.pipeline",
    "batch.jobs.bronze_to_silver",
    "batch.jobs.bronze_to_silver_weather",
    "batch.jobs.silver_to_gold",
    "batch.jobs.silver_to_gold_weather",
    "batch.jobs.rag_indexer",
    "batch.jobs.baseline_learning",
    "batch.jobs.alerter",
]
ignore_errors = true

# RAG: ChromaDB HttpClient type stubs are incomplete
[[tool.mypy.overrides]]
module = [
    "rag.collections",
    "rag.indexer",
    "rag.retriever",
    "rag.client",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["apps", "packages", "tests"]
markers = ["unit", "integration"]

[tool.coverage.run]
source = ["apps", "packages"]
omit = ["*/tests/*", "*/.venv/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=6.0",
    "ruff>=0.9",
    "mypy>=1.15",
]

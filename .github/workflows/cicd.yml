name: CI / CD

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # CI — three parallel jobs
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras --frozen
      - run: make lint

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras --frozen
      - run: make typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras --frozen
      - run: make test-unit

  # ---------------------------------------------------------------------------
  # Build & push — only on push to main, runs after CI passes
  # Each service builds in parallel via matrix; BuildKit GHA cache per service.
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & push ${{ matrix.service }}
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: traffic-ingestion
            dockerfile: apps/traffic-ingestion/Dockerfile
          - service: weather-ingestion
            dockerfile: apps/weather-ingestion/Dockerfile
          - service: streaming
            dockerfile: apps/streaming/Dockerfile
          - service: online
            dockerfile: apps/online/Dockerfile
          - service: ml
            dockerfile: apps/ml/Dockerfile
          - service: batch
            dockerfile: apps/batch/Dockerfile
          - service: serving
            dockerfile: apps/serving/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/urban-pulse-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/urban-pulse-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Deploy — pulls pre-built images, restarts app services only
  # Infrastructure services (postgres, redpanda, minio, …) are left untouched.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    needs: build-push
    runs-on: self-hosted
    timeout-minutes: 15
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull app images
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose \
            --env-file ~/deployment/urban-pulse-platform/.env.prod \
            -f infra/docker/docker-compose.prod.yaml \
            pull traffic-ingestion weather-ingestion streaming online ml batch serving

      - name: Restart app services
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose \
            --env-file ~/deployment/urban-pulse-platform/.env.prod \
            -f infra/docker/docker-compose.prod.yaml \
            up -d --no-deps \
            traffic-ingestion weather-ingestion streaming online ml batch serving

      - name: Healthcheck serving API
        run: |
          for i in $(seq 1 24); do
            status=$(docker inspect --format='{{.State.Health.Status}}' serving-service 2>/dev/null || echo "unknown")
            if [ "$status" = "healthy" ]; then
              echo "serving-service healthy after $((i * 5))s"
              exit 0
            fi
            echo "Attempt $i/24 — status: $status, waiting 5s..."
            sleep 5
          done
          echo "Healthcheck timed out after 120s" && exit 1

name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build & push — parallel matrix per service; BuildKit GHA cache per service.
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: traffic-ingestion
            dockerfile: apps/traffic-ingestion/Dockerfile
          - service: weather-ingestion
            dockerfile: apps/weather-ingestion/Dockerfile
          - service: streaming
            dockerfile: apps/streaming/Dockerfile
          - service: online
            dockerfile: apps/online/Dockerfile
          - service: ml
            dockerfile: apps/ml/Dockerfile
          - service: batch
            dockerfile: apps/batch/Dockerfile
          - service: serving
            dockerfile: apps/serving/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/urban-pulse-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/urban-pulse-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Deploy — pulls pre-built images, restarts app + monitoring services.
  # Infrastructure services (postgres, redpanda, minio, …) are left untouched.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    needs: build-push
    runs-on: self-hosted
    timeout-minutes: 15
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull app images
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose \
            --env-file ~/deployment/urban-pulse-platform/.env.prod \
            -f infra/docker/docker-compose.prod.yaml \
            pull traffic-ingestion weather-ingestion streaming online ml batch serving

      - name: Restart app services
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose \
            --env-file ~/deployment/urban-pulse-platform/.env.prod \
            -f infra/docker/docker-compose.prod.yaml \
            up -d --no-deps \
            traffic-ingestion weather-ingestion streaming online ml batch serving

      - name: Start monitoring exporters (idempotent)
        run: |
          docker compose \
            --env-file ~/deployment/urban-pulse-platform/.env.prod \
            -f infra/docker/docker-compose.prod.yaml \
            up -d --no-deps \
            prometheus node-exporter cadvisor nvidia-gpu-exporter

      - name: Healthcheck serving API
        run: |
          for i in $(seq 1 24); do
            status=$(docker inspect --format='{{.State.Health.Status}}' serving-service 2>/dev/null || echo "unknown")
            if [ "$status" = "healthy" ]; then
              echo "serving-service healthy after $((i * 5))s"
              exit 0
            fi
            echo "Attempt $i/24 — status: $status, waiting 5s..."
            sleep 5
          done
          echo "Healthcheck timed out after 120s" && exit 1

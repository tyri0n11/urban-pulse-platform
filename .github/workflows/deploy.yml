name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Pull latest code
        run: |
          cd ~/deployment/urban-pulse-platform
          git pull origin main

      - name: Build images
        run: |
          cd ~/deployment/urban-pulse-platform
          make prod-build

      - name: Deploy
        run: |
          cd ~/deployment/urban-pulse-platform
          make prod

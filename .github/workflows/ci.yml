name: CI

on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras --frozen
      - run: make lint

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras --frozen
      - run: make typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras --frozen
      - run: make test-unit

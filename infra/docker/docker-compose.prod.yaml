# Production compose — Urban Pulse Platform
# Replace ALL occurrences of "tyr1on.io.vn" with your actual domain before deploying.
#
# First-time setup on the server:
#   sudo mkdir -p /opt/urban-pulse/{redpanda,minio,nessie,dremio,mlflow,prefect,postgres,loki,grafana,traefik}
#   sudo chown -R $USER /opt/urban-pulse
#   touch /opt/urban-pulse/traefik/acme.json && chmod 600 /opt/urban-pulse/traefik/acme.json

name: urban-pulse-platform

networks:
  urban-pulse-platform:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Traefik — reverse proxy + automatic HTTPS via Let's Encrypt
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v2.11
    container_name: traefik
    environment:
      DOCKER_API_VERSION: "1.52"
    restart: unless-stopped
    networks:
      - urban-pulse-platform
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../infra/traefik/traefik.yml:/traefik.yml:ro
      - ../../infra/traefik/dynamic.yml:/dynamic.yml:ro
      - /opt/urban-pulse/traefik/acme.json:/acme.json
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"   # Traefik dashboard — LAN only
    deploy:
      resources:
        limits:
          memory: 128m

  # ---------------------------------------------------------------------------
  # Redpanda (Kafka-compatible broker)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
    ports:
      - "19092:19092"   # Kafka (LAN access via rpk)
    networks:
      - urban-pulse-platform
    volumes:
      - /opt/urban-pulse/redpanda:/var/lib/redpanda
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1500m

  console:
    image: docker.redpanda.com/redpandadata/console:v3.5.3
    container_name: redpanda-console
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redpanda-console.rule=Host(`redpanda.tyr1on.io.vn`)"
      - "traefik.http.routers.redpanda-console.entrypoints=websecure"
      - "traefik.http.routers.redpanda-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.redpanda-console.middlewares=basicauth@file"
      - "traefik.http.services.redpanda-console.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          memory: 256m

  connect:
    image: docker.redpanda.com/redpandadata/connectors:v1.0.23
    container_name: redpanda-connect
    restart: unless-stopped
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      CONNECT_CONFIGURATION: |
          key.converter=org.apache.kafka.connect.converters.ByteArrayConverter
          value.converter=org.apache.kafka.connect.converters.ByteArrayConverter
          group.id=connectors-cluster
          offset.storage.topic=_internal_connectors_offsets
          config.storage.topic=_internal_connectors_configs
          status.storage.topic=_internal_connectors_status
          config.storage.replication.factor=-1
          offset.storage.replication.factor=-1
          status.storage.replication.factor=-1
          offset.flush.interval.ms=1000
          producer.linger.ms=50
          producer.batch.size=131072
      CONNECT_BOOTSTRAP_SERVERS: redpanda:9092
      CONNECT_GC_LOG_ENABLED: "false"
      CONNECT_HEAP_OPTS: -Xms256M -Xmx512M
      CONNECT_LOG_LEVEL: info
    deploy:
      resources:
        limits:
          memory: 768m

  # ---------------------------------------------------------------------------
  # MinIO — standard AGPL (no license required)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API (LAN access for mc CLI)
    networks:
      - urban-pulse-platform
    volumes:
      - /opt/urban-pulse/minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`minio.tyr1on.io.vn`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    deploy:
      resources:
        limits:
          memory: 1g

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    restart: no
    networks:
      - urban-pulse-platform
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb local/urban-pulse --ignore-existing &&
        mc mb local/urban-pulse/bronze --ignore-existing &&
        mc mb local/urban-pulse/silver --ignore-existing &&
        mc mb local/urban-pulse/gold --ignore-existing &&
        mc mb local/warehouse --ignore-existing &&
        mc mb local/mlflow --ignore-existing
        exit 0;
      "

  # ---------------------------------------------------------------------------
  # Nessie — Iceberg catalog
  # ---------------------------------------------------------------------------
  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    container_name: nessie
    restart: unless-stopped
    networks:
      - urban-pulse-platform
    environment:
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      QUARKUS_ROCKSDB_DATABASE_PATH: /nessie/data
      S3_CREDS_NAME: ${NESSIE_S3_ACCESS_KEY}
      S3_CREDS_SECRET: ${NESSIE_S3_SECRET_KEY}
    volumes:
      - ./nessie/application.properties:/deployments/config/application.properties:ro
      - /opt/urban-pulse/nessie:/nessie/data
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/iceberg/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Dremio — SQL query engine over Iceberg/MinIO
  # ---------------------------------------------------------------------------
  dremio:
    image: dremio/dremio-oss:latest
    platform: linux/x86_64
    container_name: dremio
    restart: unless-stopped
    networks:
      - urban-pulse-platform
    volumes:
      - /opt/urban-pulse/dremio:/opt/dremio/data
    depends_on:
      - nessie
      - minio
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9047/apiv2/server_status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dremio.rule=Host(`dremio.tyr1on.io.vn`)"
      - "traefik.http.routers.dremio.entrypoints=websecure"
      - "traefik.http.routers.dremio.tls.certresolver=letsencrypt"
      - "traefik.http.services.dremio.loadbalancer.server.port=9047"
    deploy:
      resources:
        limits:
          memory: 6g

  dremio-setup:
    image: python:3.12-slim
    container_name: dremio-setup
    restart: no
    networks:
      - urban-pulse-platform
    environment:
      DREMIO_ADMIN_USER: ${DREMIO_ADMIN_USER}
      DREMIO_ADMIN_PASSWORD: ${DREMIO_ADMIN_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      NESSIE_S3_ACCESS_KEY: ${NESSIE_S3_ACCESS_KEY:-${MINIO_ROOT_USER}}
      NESSIE_S3_SECRET_KEY: ${NESSIE_S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
    volumes:
      - ./dremio/setup.sh:/setup.sh:ro
    entrypoint: >
      /bin/sh -c "
        apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 &&
        /setup.sh
      "
    depends_on:
      dremio:
        condition: service_healthy
      nessie:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # MLflow — experiment tracking + model registry
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    container_name: mlflow
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root s3://mlflow/
    networks:
      - urban-pulse-platform
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /opt/urban-pulse/mlflow:/mlflow
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=Host(`mlflow.tyr1on.io.vn`)"
      - "traefik.http.routers.mlflow.entrypoints=websecure"
      - "traefik.http.routers.mlflow.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mlflow.middlewares=basicauth@file"
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Prefect — workflow orchestration
  # ---------------------------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    networks:
      - urban-pulse-platform
    environment:
      PREFECT_HOME: /prefect
      PREFECT_UI_API_URL: https://prefect.tyr1on.io.vn/api
    volumes:
      - /opt/urban-pulse/prefect:/prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prefect.rule=Host(`prefect.tyr1on.io.vn`)"
      - "traefik.http.routers.prefect.entrypoints=websecure"
      - "traefik.http.routers.prefect.middlewares=basicauth@file"
      - "traefik.http.routers.prefect.entrypoints=websecure"
      - "traefik.http.routers.prefect.tls.certresolver=letsencrypt"
      - "traefik.http.services.prefect.loadbalancer.server.port=4200"
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # PostgreSQL — online feature store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: urbanpulse
    networks:
      - urban-pulse-platform
    volumes:
      - /opt/urban-pulse/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-urbanpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Cloudflare DDNS — auto-update DNS when server IP changes
  # ---------------------------------------------------------------------------
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    restart: unless-stopped
    network_mode: host
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
      DOMAINS: >-
        tyr1on.io.vn,
        api.tyr1on.io.vn,
        grafana.tyr1on.io.vn,
        mlflow.tyr1on.io.vn,
        minio.tyr1on.io.vn,
        prefect.tyr1on.io.vn,
        redpanda.tyr1on.io.vn,
        dremio.tyr1on.io.vn
      PROXIED: "false"
      UPDATE_CRON: "@every 5m"
      IP6_PROVIDER: "none"

  # ---------------------------------------------------------------------------
  # App services
  # ---------------------------------------------------------------------------
  traffic-ingestion:
    container_name: traffic-ingestion-service
    build:
      context: ../..
      dockerfile: apps/traffic-ingestion/Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      VIETMAP_API_KEY: ${VIETMAP_API_KEY}
      DRY_RUN: "false"
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  weather-ingestion:
    container_name: weather-ingestion-service
    build:
      context: ../..
      dockerfile: apps/weather-ingestion/Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DRY_RUN: "false"
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  streaming:
    container_name: streaming-service
    build:
      context: ../..
      dockerfile: apps/streaming/Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  online:
    container_name: online-service
    build:
      context: ../..
      dockerfile: apps/online/Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ICEBERG_CATALOG_URI: http://nessie:19120/iceberg/
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/urbanpulse
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nessie:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  ml:
    container_name: ml-service
    build:
      context: ../..
      dockerfile: apps/ml/Dockerfile
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ICEBERG_CATALOG_URI: http://nessie:19120/iceberg/
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    networks:
      - urban-pulse-platform
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g

  batch:
    container_name: batch-service
    build:
      context: ../..
      dockerfile: apps/batch/Dockerfile
    restart: unless-stopped
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ICEBERG_CATALOG_URI: http://nessie:19120/iceberg/
      PREFECT_LOGGING_TO_API_ENABLED: "false"
      PREFECT_LOGGING_EXTRA_LOGGERS: "batch.jobs.bronze_to_silver,batch.jobs.silver_to_gold,batch.jobs.baseline_learning,batch.jobs.rag_indexer,batch.pipeline"
      PREFECT_LOGGING_LEVEL: INFO
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/urbanpulse
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    networks:
      - urban-pulse-platform
    depends_on:
      prefect-server:
        condition: service_healthy
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
      ml:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g

  serving:
    container_name: serving-service
    build:
      context: ../..
      dockerfile: apps/serving/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/urbanpulse
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_EMBED_MODEL: nomic-embed-text
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    networks:
      - urban-pulse-platform
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # General API router - 120 req/min per IP
      - "traefik.http.routers.serving.rule=Host(`api.tyr1on.io.vn`)"
      - "traefik.http.routers.serving.entrypoints=websecure"
      - "traefik.http.routers.serving.tls.certresolver=letsencrypt"
      - "traefik.http.routers.serving.middlewares=api-ratelimit@file,secure-headers@file"
      - "traefik.http.routers.serving.priority=1"
      - "traefik.http.services.serving.loadbalancer.server.port=8000"
      - "traefik.http.services.serving.loadbalancer.responseForwarding.flushInterval=-1"
      # LLM router (higher priority) - 10 req/min per IP
      - "traefik.http.routers.serving-llm.rule=Host(`api.tyr1on.io.vn`) && (PathPrefix(`/chat`) || PathPrefix(`/rca`))"
      - "traefik.http.routers.serving-llm.entrypoints=websecure"
      - "traefik.http.routers.serving-llm.tls.certresolver=letsencrypt"
      - "traefik.http.routers.serving-llm.middlewares=llm-ratelimit@file,secure-headers@file"
      - "traefik.http.routers.serving-llm.service=serving"
      - "traefik.http.routers.serving-llm.priority=10"
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Next.js UI
  # ---------------------------------------------------------------------------
  ui:
    container_name: ui-service
    build:
      context: ../../v0-urban-pulse-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - urban-pulse-platform
    depends_on:
      serving:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=Host(`tyr1on.io.vn`)"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ui.middlewares=secure-headers@file"
      - "traefik.http.services.ui.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256m

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    networks:
      - urban-pulse-platform
    volumes:
      - ../../infra/monitoring/logging/loki-config.yml:/etc/loki/config.yml:ro
      - /opt/urban-pulse/loki:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    networks:
      - urban-pulse-platform
    volumes:
      - ../../infra/monitoring/logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    networks:
      - urban-pulse-platform
    volumes:
      - /opt/urban-pulse/grafana:/var/lib/grafana
      - ../../infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.tyr1on.io.vn
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      loki:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.tyr1on.io.vn`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256m

  # ---------------------------------------------------------------------------

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    networks:
      - urban-pulse-platform
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    runtime: nvidia
    restart: unless-stopped
    networks:
      - urban-pulse-platform
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4g

volumes:
  ollama-data:
  chroma-data:

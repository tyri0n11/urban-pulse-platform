# Shared infrastructure services — extend with dev/prod overlays
name: urban-pulse-platform

networks:
  urban-pulse-platform:
    driver: bridge

volumes:
  redpanda:
  minio-data:
  loki-data:
  grafana-data:
  dremio-data:

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
    command:
      - redpanda start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1 # Limit to 1 CPU core for development
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    networks:
      - urban-pulse-platform
    volumes:
      - redpanda:/var/lib/redpanda
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  console:
    image: docker.redpanda.com/redpandadata/console:v3.5.3
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        kafkaConnect:
          enabled: true
          clusters:
            - name: local-connect-cluster
              url: http://connect:8083
    ports:
      - "8080:8080"
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy

  connect:
    image: docker.redpanda.com/redpandadata/connectors:v1.0.23
    hostname: connect
    container_name: connect
    networks:
      - urban-pulse-platform
    #platform: 'linux/amd64'
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_CONFIGURATION: |
          key.converter=org.apache.kafka.connect.converters.ByteArrayConverter
          value.converter=org.apache.kafka.connect.converters.ByteArrayConverter
          group.id=connectors-cluster
          offset.storage.topic=_internal_connectors_offsets
          config.storage.topic=_internal_connectors_configs
          status.storage.topic=_internal_connectors_status
          config.storage.replication.factor=-1
          offset.storage.replication.factor=-1
          status.storage.replication.factor=-1
          offset.flush.interval.ms=1000
          producer.linger.ms=50
          producer.batch.size=131072
      CONNECT_BOOTSTRAP_SERVERS: redpanda:9092
      CONNECT_GC_LOG_ENABLED: "false"
      CONNECT_HEAP_OPTS: -Xms512M -Xmx512M
      CONNECT_LOG_LEVEL: info

  ingestion:
    container_name: ingestion-service
    build:
      context: ../..
      dockerfile: apps/ingestion/Dockerfile
    env_file:
      - ../../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DRY_RUN: ${DRY_RUN:-false}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
    restart: on-failure

  streaming:
    container_name: streaming-service
    build:
      context: ../..
      dockerfile: apps/streaming/Dockerfile
    env_file:
      - ../../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - urban-pulse-platform
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure


  # MinIO service for object storage
  minio:
    image: quay.io/minio/aistor/minio:latest
    command: server /data --console-address ":9001" --license /minio.license
    env_file:
      - ../../.env
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - urban-pulse-platform
    volumes:
      - minio-data:/data
      - ${HOME}/Downloads/minio.license:/minio.license:ro
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio-setup:
    image: minio/mc:latest
    env_file:
      - ../../.env
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - urban-pulse-platform
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb local/urban-pulse --ignore-existing &&
        mc mb local/urban-pulse/bronze --ignore-existing &&
        mc mb local/urban-pulse/silver --ignore-existing &&
        mc mb local/urban-pulse/gold --ignore-existing &&
        mc mb local/warehouse --ignore-existing
        exit 0;
      "

  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    container_name: nessie
    ports:
      - "19120:19120"
    networks:
      - urban-pulse-platform
    volumes:
      - ./nessie/application.properties:/deployments/config/application.properties:ro
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/iceberg/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  dremio:
    image: dremio/dremio-oss:latest
    platform: linux/x86_64
    container_name: dremio
    ports:
      - "9047:9047"
      - "31010:31010"
      - "32010:32010"
    networks:
      - urban-pulse-platform
    volumes:
      - dremio-data:/opt/dremio/data
    depends_on:
      - nessie
      - minio
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9047/apiv2/server_status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  dremio-setup:
    image: python:3.12-slim
    container_name: dremio-setup
    networks:
      - urban-pulse-platform
    env_file:
      - ../../.env
    volumes:
      - ./dremio/setup.sh:/setup.sh:ro
    entrypoint: >
      /bin/sh -c "
        apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 &&
        /setup.sh
      "
    depends_on:
      dremio:
        condition: service_healthy
      nessie:
        condition: service_healthy

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    networks:
      - urban-pulse-platform
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  batch:
    container_name: batch-service
    build:
      context: ../..
      dockerfile: apps/batch/Dockerfile
    env_file:
      - ../../.env
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ICEBERG_CATALOG_URI: http://nessie:19120/iceberg/
    networks:
      - urban-pulse-platform
    depends_on:
      prefect-server:
        condition: service_healthy
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
    restart: on-failure

  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    networks:
      - urban-pulse-platform
    volumes:
      - ../../infra/monitoring/logging/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  promtail:
    image: grafana/promtail:3.4.2
    command: -config.file=/etc/promtail/config.yml
    networks:
      - urban-pulse-platform
    volumes:
      - ../../infra/monitoring/logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    networks:
      - urban-pulse-platform
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    depends_on:
      loki:
        condition: service_healthy
